apiVersion: apps/v1
kind: Deployment
metadata:
    name: ip-app-deployment
spec:
    replicas: 2
    selector:
        matchLabels:
          app: ip-app
    template:
        metadata:
          labels:
            app: ip-app
        spec:
          containers:
          - name: ip-app
            image: harshajain/ip_app:2
            ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: ip-app-service
spec:
    type: ClusterIP
    selector:
      app: ip-app
    ports:
    - port: 80
      targetPort: 80